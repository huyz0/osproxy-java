name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v1.0.0 && git push origin v1.0.0`.
# The tag drives two things: it must match the workspace version, and it publishes
# every library module to Maven Central via the Central Portal.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-releases, e.g. v1.0.0-rc.1

permissions:
  contents: read

jobs:
  # Fail fast if the pushed tag does not match the convention plugin's version,
  # so a mistagged push can never publish the wrong version to Central.
  guard:
    name: Tag matches workspace version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compare tag to workspace version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -oP '(?<=^version = ")[^"]+' \
            build-logic/src/main/kotlin/osproxy.java-conventions.gradle.kts)"
          echo "tag=$tag workspace=$ver"
          test "$tag" = "$ver" || { echo "::error::tag $tag != workspace version $ver"; exit 1; }

  maven-central:
    name: Publish to Maven Central
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      # One deployment: publishToMavenCentral stages every library module
      # (osproxy-server and osproxy-jmh don't apply osproxy.publish-conventions,
      # so they're skipped) and Central Portal auto-releases on success — no
      # separate close/release step. `--no-configuration-cache`: the publish
      # plugin's signing/upload tasks are not configuration-cache-safe.
      - name: Publish
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache
